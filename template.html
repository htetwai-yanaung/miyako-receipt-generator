<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyako - Online Language Academy</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-200">


    <nav class="bg-white fixed w-full z-20 top-0 start-0 border-b border-gray-300">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="https://flowbite.com/" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="./logo.png" class="h-7" alt="Flowbite Logo" />
                <span class="self-center text-xl text-heading font-semibold whitespace-nowrap">Miyako</span>
            </a>
            <button data-collapse-toggle="navbar-default" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-gray-200 hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary" aria-controls="navbar-default" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
            </button>
            <div class="hidden w-full md:block md:w-auto" id="navbar-default">
                <ul class="font-medium flex flex-col p-1 md:p-0 mt-4 border border-gray-300 rounded-md bg-gray-200 md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary">
                <li>
                    <a href="index.html" class="block py-2 px-3 text-indigo-500 rounded-md md:bg-transparent md:text-fg-brand md:p-0 " aria-current="page">Home</a>
                </li>
                <li>
                    <a href="history.html" class="block py-2 px-3 text-indigo-500 rounded-md hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">History</a>
                </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="mt-20 p-6">
        <div class="mb-6">
            <a href="history.html" class="font-medium rounded-md text-sm px-4 py-2.5 text-center leading-5 bg-gray-500 text-white">Back</a>
        </div>
        <div id="receipt-template" class="bg-white p-6 flex flex-col gap-3 max-w-[1080px]">
            <div class="flex flex-col justify-center items-center gap-3">
                <img src="./logo.png" alt="Logo" class="w-30 h-30">
                <h2 class="text-xl font-bold">RECEIPT</h2>
            </div>
            <div class="flex justify-between items-center">
                <span class="" id="r-date">12-2-2026</span>
                <span class="" id="r-id">No.12345</span>
            </div>
            <hr class="border-dashed">
            <div class="grid grid-cols-2">
                <span class="text-gray-500 font-semibold">Student Name</span>
                <span class="text-gray-800 font-semibold">: <span id="r-name"></span></span>
            </div>
            <div class="grid grid-cols-2">
                <span class="text-gray-500 font-semibold">Course</span>
                <span class="text-gray-800 font-semibold">: <span id="r-course"></span></span>
            </div>
            <div class="grid grid-cols-2">
                <span class="text-gray-500 font-semibold">Course Duration</span>
                <span class="text-gray-800 font-semibold">: <span id="r-duration">0</span> Months</span>
            </div>
            <hr class="border-dashed">
            <div class="grid grid-cols-2">
                <span class="text-gray-500 font-semibold">Total Fee</span>
                <span class="text-gray-800 font-semibold">: <span id="r-totalFee">0</span> MMK</span>
            </div>
            <div class="grid grid-cols-2">
                <span class="text-gray-500 font-semibold">Received Amount</span>
                <span class="text-gray-800 font-semibold">: <span id="r-receivedAmount">0</span> MMK</span>
            </div>
            <hr class="border-dashed">
            <div class="flex flex-col self-end">
                <div class="flex flex-col items-center">
                    <span class="text-gray-800 font-semibold">Sensei</span>
                    <span class="text-gray-800 font-semibold underline decoration-dashed underline-offset-8">Yu Yu Kyaw</span>
                </div>
            </div>
        </div>

        <div class="mt-6 flex justify-center">
            <button id="download-btn" type="button" class="w-1/2 text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-green-300 dark:focus:ring-green-800 font-medium rounded-md text-sm px-4 py-2.5 text-center leading-5">Download</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <script type="module" src="./server.js"></script>

    <script type="module" src="./template.js"></script>
</body>
</html>
