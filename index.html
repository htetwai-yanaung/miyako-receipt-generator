<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyako - Online Language Academy</title>
    <!-- <link rel="stylesheet" href="./style.css"> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-200">


    <nav class="bg-white fixed w-full z-20 top-0 start-0 border-b border-gray-300">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="https://flowbite.com/" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="./logo.png" class="h-7" alt="Flowbite Logo" />
                <span class="self-center text-xl text-heading font-semibold whitespace-nowrap">Miyako</span>
            </a>
            <button data-collapse-toggle="navbar-default" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-gray-200 hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary" aria-controls="navbar-default" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
            </button>
            <div class="hidden w-full md:block md:w-auto" id="navbar-default">
                <ul class="font-medium flex flex-col p-1 md:p-0 mt-4 border border-gray-300 rounded-md bg-gray-200 md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary">
                <li>
                    <a href="index.html" class="block py-2 px-3 text-indigo-500 rounded-md md:bg-transparent md:text-fg-brand md:p-0 " aria-current="page">Home</a>
                </li>
                <li>
                    <a href="history.html" class="block py-2 px-3 text-indigo-500 rounded-md hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">History</a>
                </li>
                </ul>
            </div>
        </div>
    </nav>
      

























    <div class="mt-20 p-6">
        <form id="receiptForm" class="max-w-md mx-auto bg-white p-6 rounded-md border border-gray-300">
            <div class="mb-5">
                <h1 class="text-center text-xl font-bold text-gray-600">Receipt Form</h1>
            </div>
            <div class="mb-5">
                <label for="studentName" class="block mb-2.5 font-medium text-gray-500">Student Name</label>
                <input type="text" id="studentName" class="bg-transparent border border-indigo-200 text-gray-500 rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter student name" required />
            </div>
            <div class="mb-5">
                <label for="course" class="block mb-2.5 font-medium text-gray-500">Course</label>
                <input type="text" id="course" class="bg-transparent border border-indigo-200 text-gray-500 rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter course" required />
            </div>
            <div class="mb-5">
                <label for="duration" class="block mb-2.5 font-medium text-gray-500">Course Duration</label>
                <input type="number" id="duration" class="bg-transparent border border-indigo-200 text-gray-500 rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter course duration" required />
            </div>
            <div class="mb-5">
                <label for="totalFee" class="block mb-2.5 font-medium text-gray-500">Total Fee</label>
                <input type="number" id="totalFee" class="bg-transparent border border-indigo-200 text-gray-500 rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter total fee" required />
            </div>
            <div class="mb-5">
                <label for="receivedAmount" class="block mb-2.5 font-medium text-gray-500">Received Amount</label>
                <input type="number" id="receivedAmount" class="bg-transparent border border-indigo-200 text-gray-500 rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter received amount" required />
            </div>
            <button type="submit" class="w-full text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-green-300 dark:focus:ring-green-800 font-medium rounded-md text-sm px-4 py-2.5 text-center leading-5">Generate</button>
        </form>
    </div>

    <div id="receipt-container" style="display: none;">
        <div id="receipt-template" class="receipt-box">
            <div class="receipt-header">
                <img src="./logo.png" alt="Logo" class="receipt-logo">
                <h2>OFFICIAL RECEIPT</h2>
            </div>
            <hr>
            <p><strong>Date:</strong> <span id="r-date"></span></p>
            <p><strong>Receipt No:</strong> <span id="r-id"></span></p>
            <hr>
            <p><strong>Customer:</strong> <span id="r-name"></span></p>
            <div class="item-row">
                <span>Description: Payment for Services</span>
                <span id="r-amount"></span>
            </div>
            <hr>
            <h3 class="total">Total: <span id="r-total"></span> MMK</h3>
            <p class="footer">Thank you for your business!</p>
        </div>
        <button id="download-btn">Download as Image</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <script type="module" src="./server.js"></script>

    <script type="module" src="./script.js"></script>
</body>
</html>
